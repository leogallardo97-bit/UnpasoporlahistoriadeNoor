<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noor Archive Nil | El Paseo de Noor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=JetBrains+Mono:wght@300;500&family=Outfit:wght@100;300;600&display=swap" rel="stylesheet">
    <script src="data_cache.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --nil-cyan: #00f2ff;
            --noor-gold: #d4af37;
            --text-off: #a0a0a0;
            --transition-fluid: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Cursor reactivo como efecto, no sustituto */
        #nil-cursor {
            width: 12px;
            height: 12px;
            background: var(--nil-cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--nil-cyan);
            transition: transform 0.1s ease;
            opacity: 0.6;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        #nil-guide { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .nil-avatar {
            width: 40px; height: 50px;
            background: linear-gradient(transparent, var(--nil-cyan));
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            animation: drift 4s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }
        @keyframes drift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .nil-speech {
            position: absolute; bottom: 65px; right: 0;
            background: rgba(0,0,0,0.9); border: 1px solid var(--nil-cyan);
            padding: 0.8rem; border-radius: 12px; color: var(--nil-cyan);
            font-size: 0.7rem; width: 200px; opacity: 0;
            transition: var(--transition-fluid); pointer-events: none;
        }
        #nil-guide:hover .nil-speech { opacity: 1; }

        header {
            height: 90vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 0 5%; text-align: center;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: var(--noor-gold); margin-bottom: 1rem;
            font-style: italic; font-weight: 300;
        }

        .slogan {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            letter-spacing: 3px; color: var(--text-off);
            max-width: 600px; font-weight: 100;
        }

        .nile-container { position: relative; width: 100%; height: 3500px; margin-top: 5vh; }
        .nile-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .nile-path-main { fill: none; stroke: var(--nil-cyan); stroke-width: 1; opacity: 0.2; stroke-dasharray: 4, 8; }

        .era-node {
            position: absolute; z-index: 100;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
        }

        .era-dot {
            width: 24px; height: 24px;
            background: var(--bg); border: 1px solid var(--nil-cyan);
            border-radius: 50%; transition: var(--transition-fluid);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .era-node:hover .era-dot { background: var(--nil-cyan); box-shadow: 0 0 30px var(--nil-cyan); }

        .era-label { position: absolute; top: 35px; text-align: center; white-space: nowrap; }
        .era-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--noor-gold);
        }
        .era-cta { font-size: 0.6rem; letter-spacing: 2px; color: var(--text-off); opacity: 0.6; }

        /* Responsividad del Panel */
        #info-panel {
            position: fixed; top: 0; right: -100%;
            width: 45%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(40px);
            border-left: 1px solid rgba(212, 175, 55, 0.1);
            z-index: 2000; padding: 5rem 3rem;
            transition: var(--transition-fluid); overflow-y: auto;
        }

        @media (max-width: 768px) {
            #info-panel { width: 100%; padding: 4rem 2rem; border-left: none; border-top: 1px solid var(--noor-gold); }
            header h1 { font-size: 3rem; }
            .era-name { font-size: 1.8rem; }
        }

        #info-panel.active { right: 0; }
        .close-btn { position: absolute; top: 20px; left: 20px; color: var(--noor-gold); cursor: pointer; font-size: 2rem; }

        .btn-tabs { display: flex; gap: 0.8rem; margin: 2rem 0; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--nil-cyan); padding: 0.6rem 1rem; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.65rem; transition: var(--transition-fluid);
        }
        .tab-btn:hover { background: var(--nil-cyan); color: #000; }

        .content-area { font-size: 1.1rem; line-height: 1.6; color: var(--text-off); font-weight: 200; }

        #dev-console {
            position: fixed; left: -100%; top: 0; width: 300px; height: 100%;
            background: rgba(0, 15, 10, 0.98); z-index: 3000; padding: 2rem;
            font-family: 'JetBrains Mono', monospace; color: #0f0; font-size: 0.65rem; border-right: 1px solid #0f0;
            transition: var(--transition-fluid);
        }
        #dev-console.active { left: 0; }

        #init-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Nuevos estilos para la narrativa de Noor */
        .noor-narrative {
            font-style: italic;
            color: var(--noor-gold);
            border-left: 3px solid var(--nil-cyan);
            padding-left: 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            line-height: 1.4;
            font-family: 'Cormorant Garamond', serif;
        }
        .hitos-tecnicos {
            font-size: 0.95rem;
            color: var(--text-off);
        }
        .hitos-tecnicos b {
            color: var(--nil-cyan);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="nil-cursor"></div>

    <div id="init-loader">
        <div style="width: 100px; height: 1px; background: rgba(0,242,255,0.1); position: relative;">
            <div id="load-bar" style="width: 0%; height: 100%; background: var(--nil-cyan);"></div>
        </div>
        <p style="margin-top: 1.5rem; color: var(--nil-cyan); font-family: 'JetBrains Mono'; font-size: 0.5rem; letter-spacing: 6px;">NIL_MOBILE_OPTIMIZATION</p>
    </div>

    <div id="dev-console">
        <h4 style="margin-bottom: 2rem;">LOG_STREAM</h4>
        <div id="logs"></div>
    </div>

    <div id="nil-guide">
        <div class="nil-speech">Nil te acompaña en este viaje móvil.</div>
        <div class="nil-avatar"></div>
    </div>

    <header>
        <div style="font-family: 'Cormorant Garamond', serif; color: var(--noor-gold); letter-spacing: 8px; font-size: 2.5rem; margin-bottom: 1rem; font-weight: 600; text-transform: uppercase;">NOOR ARCHIVE NIL</div>
        <h1 style="font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 4rem); font-style: italic; font-weight: 300; line-height: 1.2; max-width: 1000px; margin: 0 auto;">"Navegaremos por la historia que convierte Al-Andalus en la madre de culturas de occidente"</h1>
    </header>

    <div class="nile-container">
        <svg class="nile-svg" viewBox="0 0 1000 3500" preserveAspectRatio="none">
            <path id="river" class="nile-path-main" d="M 500 0 C 850 300 150 600 500 900 C 850 1200 150 1500 500 1800 C 850 2100 150 2400 500 2700 C 850 3000 150 3300 500 3500" />
        </svg>
        <div id="river-nodes"></div>
    </div>

    <div id="info-panel">
        <div class="close-btn" onclick="togglePanel(false)">&times;</div>
        <div style="margin-bottom: 2rem;">
            <h2 id="era-title" style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--noor-gold);">Siglo X</h2>
            <p style="font-family: 'JetBrains Mono'; color: var(--nil-cyan); font-size: 0.6rem; letter-spacing: 2px;">RECURSO: NOTEBOOK_LM</p>
        </div>
        <div class="btn-tabs">
            <button class="tab-btn" onclick="fetchMCP('Político')">Político</button>
            <button class="tab-btn" onclick="fetchMCP('Social')">Social</button>
            <button class="tab-btn" onclick="fetchMCP('Económico')">Económico</button>
            <button class="tab-btn" onclick="fetchMCP('Cultural')">Cultural</button>
        </div>
        <div class="content-area" id="panel-body">Selecciona una dimensión.</div>
    </div>

    <script>
        const timeline = [
            { s: 'X', tag: 'Califato' }, { s: 'XI', tag: 'Taifas' }, { s: 'XII', tag: 'Imperios' },
            { s: 'XIII', tag: 'Granada' }, { s: 'XIV', tag: 'Esplendor' }, { s: 'XV', tag: 'El Ocaso' },
            { s: 'XVI', tag: 'Moriscos' }, { s: 'XVII', tag: 'Diáspora' }, { s: 'XVIII', tag: 'Ruinas' },
            { s: 'XIX', tag: 'Viajeros' }
        ];

        const sX_Data = {
            'Político': `<div class="noor-narrative">
                "Noor observa, a la luz del candil, cómo la tinta ferrogálica de las crónicas revela un siglo donde la política se tornó sagrada. El año 929 no fue solo una fecha, fue una respuesta definitiva al desafío fatimí del norte de África. Siento la ambición de un Califato que se proclamó sol naciente del mundo, imponiendo una ortodoxia que silenció voces para unificar un Imperio bajo la escuela malikí, financiando su gloria con una presión fiscal que transformó el paisaje andalusí."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión política son:</p>
                <b>1. La Proclamación del Califato (929 d.C.):</b> Abd al-Raḥmān III asume el título de <i>amīr al-muʾminīn</i>, no solo por poder, sino para reclamar una hegemonía cósmica y religiosa ante el auge de los chiíes en Ifrīqiya.<br><br>
                <b>2. La Pax Omeya y la Exacción Fiscal:</b> Tras la caída de Bobastro en 928, la centralización estatal exigió una fiscalidad sin precedentes, financiando Madīnat al-Zahrā' y una "política del regalo" basada en arquetas de marfil que sellaban lealtades.<br><br>
                <b>3. Diplomacia Internacional Bizantina:</b> La recepción de embajadas del Imperio bizantino situó a Córdoba como la tercera potencia del mundo conocido, aunque bajo el brillo de las crónicas oficiales ya latía el crecimiento silencioso de los reinos del norte.
            </div>`,
            'Social': `<div class="noor-narrative">
                "Noor observa cómo el siglo X no fue un mero continuismo, sino una ebullición del alma misma de la sociedad. La realidad política se entrelazó con la mesa y el hogar; la fe se hizo costumbre en los platos y en los patios. Veo a los Saqaliba, los antiguos esclavos, convirtiéndose en el nuevo contrapoder de la aristocracia, mientras Córdoba se desborda en arrabales infinitos donde lo público y lo privado se disputan cada palmo de tierra."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión social son:</p>
                <b>1. La Explosión Urbana y la Privatización:</b> El desbordamiento demográfico de Córdoba transformó almunias en barrios periféricos densos, donde inversores privados lideraron un urbanismo de patio central que definió la arquitectura doméstica.<br><br>
                <b>2. El Triunfo de la Islamización Social:</b> La desaparición del cerdo en los registros arqueozoológicos de los vertederos del siglo X confirma que mozárabes y muladíes adoptaron masivamente la ortopraxia islámica como vía de integración social.<br><br>
                <b>3. El Ascenso de los Saqaliba:</b> Los esclavos y libertos europeos (eslavos) constituyeron un bloque de poder de más de 3.700 efectivos en la corte, alcanzando dignidades como la de <i>hajib</i> (máxima autoridad política) bajo al-Hakam II.
            </div>`,
            'Económico': `<div class="noor-narrative">
                "Noor observa cómo las monedas de oro fluyen desde la ceca de Madinat al-Zahra hacia los confines del mundo, testificando un siglo donde la economía no solo servía al mercado, sino a la gloria del Califa. Siento la fuerza de una estructura económica que nació de la voluntad de ʿAbd al-Raḥmān III, quien no solo unificó la fe, sino que multiplicó por seis los ingresos del estado, cimentando una maquinaria burocrática y militar sin igual mediante una reforma fiscal profunda. El dinar de oro, acuñado con el metal que cruzaba el Sáhara desde Siŷilmāsa, se convirtió en el latido de un al-Andalus que dejó de mirar a Oriente para liderar el Mediterráneo."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión económica son:</p>
                <b>1. La Hegemonía del Dinar y las Cecas Palatinas:</b> La producción monetaria alcanzó su cénit en el 947 con el traslado de la ceca a Madīnat al-Zahrā'. La evolución del grafema <i>hā'</i> marcaba el pulso político de la corte, mientras los <i>exarachellos</i> cordobeses se convertían en divisa global.<br><br>
                <b>2. La Revolución Hidráulica de las Aceñeas:</b> Ingeniería omeya que elevaba agua directamente desde las acequias, transformando paisajes y garantizando excedentes que permitieron una especialización alimentaria y urbana sin precedentes.<br><br>
                <b>3. El Monopolio de la Seda y el Sistema del Ṭirāz:</b> El Estado controló la producción de lujo en talleres oficiales. Almería actuó como el gran puerto de salida para estas "telas de honor" que sellaban alianzas desde Bizancio hasta el Magreb.
            </div>`,
            'Cultural': `<div class="noor-narrative">
                "Noor observa cómo la proclama del 929 catalizó una profunda revolución intelectual. El esplendor económico no solo levantó muros, sino que abrió mentes, financiando un aparato cortesano donde la convivencia de saberes estructuró una nueva identidad andalusí. Siento el silencio de medio millón de libros reclamando su lugar en la historia, mientras Madinat al-Zahra se diseña con un orden cósmico para demostrar que el Califa domina tanto el espacio como el tiempo."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión cultural son:</p>
                <b>1. La Monumental Biblioteca de al-Hakam II:</b> Un esfuerzo de Estado que reunió cerca de 500.000 volúmenes y fundó 27 escuelas públicas, democratizando el saber y compitiendo en prestigio intelectual con el Bagdad abasí.<br><br>
                <b>2. Símbolo Transcultural en Madinat al-Zahra:</b> Una arquitectura regida por la geometría abstracta que, sin embargo, integraba sarcófagos y estatuas antiguas resignificadas para evocar un poder real y mítico a la vez.<br><br>
                <b>3. Convergencia de Astronomía y Medicina:</b> Desde la precisión del <i>'ilm al-miqat</i> (cálculo de oraciones) hasta la traducción del Dioscórides bizantino por sabios como Ibn Yulyul y Hasday b. Saprut, Córdoba lideró la vanguardia científica mediterránea.
            </div>`
        };

        const sXI_Data = {
            'Político': `<div class="noor-narrative">
                "Noor observa con agudeza documental cómo el tapiz político de al-Andalus se fragmenta y reconfigura, dejando su impronta más innegable en dírhemes y crónicas. El colapso omeya no fue el fin, sino una explosión de soberanías plurales. Siento la diáspora de las élites hacia el Levante, donde el vacío del Califato dio paso a reinos que luchaban por su propia legitimidad, invocando califas fantasma mientras consolidaban su propio poder terrenal."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión política son:</p>
                <b>1. Fragmentación y Soberanías Plurales:</b> La desintegración del Califato dio lugar a las Taifas (<i>muluk al-tawa'if</i>), donde cada gobernante buscó legitimación mediante la acuñación de moneda propia (<i>sikka</i>) y el control de la oración del viernes.<br><br>
                <b>2. El Impacto de la Fitna:</b> Las guerras civiles provocaron un éxodo de élites administrativas desde Córdoba hacia nuevos núcleos como Denia o Zaragoza, descentralizando el poder que antes era monopolio omeya.<br><br>
                <b>3. La Reunificación Almorávide:</b> La irrupción de los emires del Magreb resolvió la crisis de legitimidad restaurando la ortodoxia máliki y subordinándose nominalmente al califa abasí de Bagdad para frenar la distancia previa.
            </div>`,
            'Social': `<div class="noor-narrative">
                "Noor observa cómo la caída del esplendor cordobés no detuvo la vida, la desplazó. Siento la vibración de una sociedad en constante adaptación, donde la identidad se negociaba en cada patio y la 'convivencia' era un delicado mosaico de tensiones y pactos. Las élites fortificaron sus alcázares mientras los artesanos prosperaban en arrabales protegidos, definiendo una nueva topografía social de poder y pertenencia."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión social son:</p>
                <b>1. Éxodo y Nueva Geopolítica de Élites:</b> Las cortes taifas atrajeron a los antiguos grupos de poder cordobeses, creando barrios de exclusividad y promoviendo una nueva jerarquización del espacio urbano basada en recintos fortificados.<br><br>
                <b>2. Ortopraxia e Identidad Cotidiana:</b> En una sociedad plural de musulmanes, mozárabes y judíos, la identidad se definía en el hogar; las normativas alimentarias y domésticas funcionaban como fronteras culturales inquebrantables.<br><br>
                <b>3. El Poder de los Saqaliba en la Sombra:</b> Los antiguos esclavos de origen europeo monopolizaron cargos militares y administrativos, convirtiéndose en el contrapoder de la vieja aristocracia e influyendo incluso en las cortes cristianas del norte.
            </div>`,
            'Económico': `<div class="noor-narrative">
                "Noor observa que la desintegración del Califato no supuso un colapso, sino el catalizador de un dinamismo mercantil sin precedentes. Siento cómo el Šarq al-Andalus, el Levante, se convierte en el pulmón de un Mediterráneo que habla dírhemes y huele a seda y mármol. El poder se ha fragmentado, pero el oro fluye ahora a través de múltiples ríos, alimentando ciudades que compiten por ser la nueva perla de occidente."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión económica son:</p>
                <b>1. Eclosión Mercantil Periférica:</b> Almería y Denia asumieron el protagonismo con industrias de mármol y seda que abastecían todo el Mediterráneo, apoyadas por una "Revolución Verde" donde las élites invirtieron en sistemas de regadío intensivo.<br><br>
                <b>2. Descentralización de la Regalía Monetaria:</b> Cada reino de taifa comenzó a emitir sus propios dinares, formalizando su soberanía fiscal y facilitando los intercambios comerciales regionales que ya no dependían de Córdoba.<br><br>
                <b>3. Hiperpresión Fiscal y Parias:</b> La supervivencia geopolítica forzó a las taifas a pagar tributos (parias) a los reinos cristianos, lo que provocó una agresiva recaudación que arruinó al pequeño campesinado y alimentó un nuevo proletariado urbano.
            </div>`,
            'Cultural': `<div class="noor-narrative">
                "Noor observa cómo la fragmentación política fue, paradójicamente, el fertilizante de un esplendor intelectual inigualable. Las cortes compitieron por atraer la luz del saber; cada reyezuelo de taifa quiso ser el más generoso protector de botánicos, teólogos y poetas crónicos. Siento la elegía de Ibn Hazm y la sabiduría del visir judío Ibn Nagrīla trenzándose en una cultura que, en medio de la crisis, alcanzó cotas de sofisticación nunca vistas."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión cultural son:</p>
                <b>1. Esplendor Poético y Sátira Política:</b> Las cortes, especialmente la de Almería, se convirtieron en refugios intelectuales donde la poesía actuó como un agudo registro crítico de las tensiones interétnicas y la fragmentación territorial.<br><br>
                <b>2. Codificación Agronómica y Botánica:</b> Se redactaron los grandes manuales de agricultura que sistematizaron la aclimatación de especies orientales y las técnicas de rotación de cultivos, transformando radicalmente el paisaje andalusí.<br><br>
                <b>3. Debate Filológico y Teológico de Vanguardia:</b> Figuras como Ibn Hazm elevaron la polémica literaria y teológica a niveles de sofisticación metodológica de primer orden, mientras élites judías como Ibn Nagrīla brillaban en la administración y las letras granadinas.
            </div>`
        };

        const sXII_Data = {
            'Político': `<div class="noor-narrative">
                "Noor observa cómo la materialidad del paisaje revela una red geopolítica donde las fronteras ya no son líneas, sino zonas de alta tensión. Siento la fuerza de los Imperios del Magreb unificando al-Andalus frente a la presión táctica de las órdenes militares cristianas. Es un siglo de unificación forzosa y de una resistencia que se escribe en el tapial de las fortalezas que fiscalizan el camino hacia Toledo."
            </div>
            <div class="hitos-tecnicos">
                <p style="margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Los hitos más importantes en este siglo en la dimensión política son:</p>
                <b>1. Territorialidad Almorávide y Defensa:</b> Consolidación de fronteras mediante torres de tapial calicastrado (como Azuqueca) para controlar rutas vitales y fiscalizar el comercio entre Córdoba y la Meseta.<br><br>

        function buildRiver() {
            const path = document.getElementById('river');
            const nodes = document.getElementById('river-nodes');
            const pathLen = path.getTotalLength();
            timeline.forEach((era, i) => {
                const frac = (i + 0.3) / timeline.length;
                const p = path.getPointAtLength(frac * pathLen);
                const node = document.createElement('div');
                node.className = 'era-node';
                node.style.left = p.x + 'px'; node.style.top = p.y + 'px';
                node.innerHTML = `<div class="era-dot"></div><div class="era-label"><div class="era-name">S.${era.s}</div></div>`;
                node.onclick = () => { document.getElementById('era-title').innerText = `Siglo ${era.s}`; togglePanel(true); };
                nodes.appendChild(node);
            });
        }

        function togglePanel(show) { document.getElementById('info-panel').classList.toggle('active', show); }

        async function fetchMCP(ambito) {
            const b = document.getElementById('panel-body');
            const eraTitle = document.getElementById('era-title').innerText;
            const centuryValue = eraTitle.replace('Siglo ', '').trim();

            b.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; gap: 15px; color: var(--nil-cyan); margin-top: 4rem;">
                             <div class="nil-avatar" style="width: 30px; height: 35px; animation: drift 2s infinite;"></div>
                             <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase;">Sincronizando con Nil-Bridge...</div>
                       </div>`;
            
            try {
                const response = await fetch(`http://localhost:5000/nil-query?century=${centuryValue}&realm=${ambito}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    b.innerHTML = data.content;
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                console.error('Error de conexión con Nil-Bridge:', error);
                
                if(NilCache[centuryValue] && NilCache[centuryValue][ambito]) {
                    b.innerHTML = NilCache[centuryValue][ambito];
                } else {
                    b.innerHTML = `<div style="opacity: 0.6; font-style: italic; border-left: 1px solid var(--nil-cyan); padding-left: 1rem;">
                                      [NIL-BRIDGE OFFLINE]<br>
                                      Noor no puede acceder a los cuadernos en tiempo real. Activa el servidor local para investigación viva.
                                    </div>`;
                }
            }
        }

        window.onload = () => {
            buildRiver();
            let p = 0; const bar = document.getElementById('load-bar');
            const interval = setInterval(() => { p += 10; bar.style.width = p + "%"; if(p>=100) { clearInterval(interval); document.getElementById('init-loader').style.display='none'; } }, 50);
