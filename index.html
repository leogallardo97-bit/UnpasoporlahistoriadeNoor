<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noor Archive Nil | Al-Andalus</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,300;1,700&family=JetBrains+Mono:wght@100;300;500&family=Outfit:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --nil-cyan: #00f2ff;
            --noor-gold: #d4af37;
            --text-off: #a0a0a0;
            --transition-fluid: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @media (pointer: fine) {
            * { cursor: none; }
            #nil-cursor { display: block; }
        }
        #nil-cursor {
            display: none; width: 10px; height: 10px;
            background: var(--nil-cyan); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 25px var(--nil-cyan);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.02) 0%, transparent 80%);
        }

        /* --- Nil Guide --- */
        #nil-guide { position: fixed; bottom: 40px; right: 40px; z-index: 1000; }
        .nil-avatar {
            width: 45px; height: 60px;
            background: linear-gradient(var(--nil-cyan), transparent);
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            animation: drift 4s ease-in-out infinite;
            filter: blur(1px); opacity: 0.9;
            box-shadow: 0 0 20px var(--nil-cyan);
        }
        @keyframes drift { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

        /* --- Header / UI Hero --- */
        header {
            height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 0 5%;
        }

        .header-graphic {
            position: relative;
            margin-bottom: 2rem;
        }

        .header-graphic .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 12vw, 8rem);
            font-weight: 700;
            font-style: italic;
            letter-spacing: -2px;
            background: linear-gradient(to right, var(--noor-gold), #fff, var(--nil-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
        }

        .header-graphic .sub-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 20px;
            color: var(--nil-cyan);
            text-transform: uppercase;
            margin-top: -10px;
            opacity: 0.6;
        }

        .slogan {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            letter-spacing: 1px;
            color: var(--text-off);
            max-width: 800px;
            line-height: 1.6;
            margin-top: 2rem;
        }

        /* --- The Nile (Curvas Pronunciadas) --- */
        .nile-container { position: relative; width: 100%; height: 3500px; }
        .nile-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .nile-line {
            fill: none;
            stroke: var(--nil-cyan);
            stroke-width: 2;
            opacity: 0.4;
            filter: drop-shadow(0 0 8px var(--nil-cyan));
        }

        /* --- Era Nodes --- */
        .era-node {
            position: absolute; z-index: 100;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
        }

        .era-dot {
            width: 14px; height: 14px;
            background: var(--nil-cyan);
            border-radius: 50%;
            transition: var(--transition-fluid);
            box-shadow: 0 0 20px var(--nil-cyan);
        }

        .era-node:hover .era-dot {
            transform: scale(2.5);
            background: var(--noor-gold);
            box-shadow: 0 0 50px var(--noor-gold);
        }

        .era-label {
            position: absolute;
            left: 30px;
            text-align: left;
            pointer-events: none;
        }

        .era-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* --- Panel Interactivo --- */
        #info-panel {
            position: fixed; top: 0; right: -100%;
            width: 45%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(50px);
            z-index: 2000; padding: 6rem 4rem;
            border-left: 1px solid rgba(212, 175, 55, 0.1);
            transition: var(--transition-fluid);
        }

        @media (max-width: 768px) {
            #info-panel { width: 100%; border-left: none; }
            .era-label { left: 0; top: 30px; text-align: center; }
        }

        #info-panel.active { right: 0; }
        .close-x { position: absolute; top: 30px; left: 40px; color: var(--noor-gold); font-size: 3rem; cursor: pointer; }

        .tabs { display: flex; gap: 1rem; margin: 3rem 0; flex-wrap: wrap; }
        .tab-btn {
            background: transparent; border: 1px solid var(--nil-cyan);
            color: var(--nil-cyan); padding: 0.8rem 1.5rem; border-radius: 4px;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 3px;
            cursor: pointer; transition: var(--transition-fluid);
        }
        .tab-btn:hover { background: var(--nil-cyan); color: #000; }

        .body-text { font-size: 1.3rem; line-height: 1.8; color: var(--text-off); font-weight: 200; }
        .body-text b { color: var(--noor-gold); font-weight: 700; }

        /* --- Dev mode --- */
        #dev-console {
            position: fixed; left: -100%; top: 0; width: 350px; height: 100%;
            background: rgba(0, 10, 15, 0.95); z-index: 5000; padding: 2rem;
            font-family: 'JetBrains Mono', monospace; color: var(--nil-cyan);
            border-right: 1px solid var(--nil-cyan); font-size: 0.65rem;
            transition: var(--transition-fluid);
        }
        #dev-console.active { left: 0; }
    </style>
</head>
<body>

    <div id="nil-cursor"></div>

    <div id="dev-console">
        <h4 style="margin-bottom: 2rem; opacity: 0.6;">BRIDGE_STREAM_ACTIVE</h4>
        <div id="logs"></div>
    </div>

    <div id="nil-guide">
        <div class="nil-avatar"></div>
    </div>

    <header>
        <div class="header-graphic">
            <h1 class="main-title">Noor Archive Nil</h1>
            <div class="sub-title">Gestión del Conocimiento de Al-Andalus</div>
        </div>
        <p class="slogan">"Navegaremos por la historia que convierte Al-Andalus en la madre de culturas de occidente"</p>
    </header>

    <div class="nile-container">
        <svg class="nile-svg" viewBox="0 0 1000 3500" preserveAspectRatio="none">
            <!-- Nilo con meandros más pronunciados -->
            <path id="nile-path" class="nile-line" d="M 500 0 C 950 400 50 700 500 1100 C 950 1400 50 1800 500 2200 C 950 2500 50 2900 500 3300 C 700 3450 500 3500 500 3500" />
        </svg>
        <div id="nodes"></div>
    </div>

    <div id="info-panel">
        <div class="close-x" onclick="toggle(false)">&times;</div>
        <h2 id="p-title" style="font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: var(--noor-gold);">Siglo X</h2>
        <p style="color: var(--nil-cyan); font-family: 'JetBrains Mono'; font-size: 0.7rem; margin-top: 10px;">RESOURCE_KEY: NOTEBOOK_LM_X</p>
        
        <div class="tabs">
            <button class="tab-btn" onclick="query('Político')">Político</button>
            <button class="tab-btn" onclick="query('Social')">Social</button>
            <button class="tab-btn" onclick="query('Económico')">Económico</button>
            <button class="tab-btn" onclick="query('Cultural')">Cultural</button>
        </div>
        
        <div class="body-text" id="p-body">
            Desplaza a Nil a través de los meandros para invocar el saber...
        </div>
    </div>

    <script>
        const timeline = [
            { s: 'X', tag: 'Califato' }, { s: 'XI', tag: 'Taifas' }, { s: 'XII', tag: 'Imperios' },
            { s: 'XIII', tag: 'Granada' }, { s: 'XIV', tag: 'Esplendor' }, { s: 'XV', tag: 'Ocaso' },
            { s: 'XVI', tag: 'Memoria' }, { s: 'XVII', tag: 'Exilio' }, { s: 'XVIII', tag: 'Estudio' },
            { s: 'XIX', tag: 'Mito' }
        ];

        const sX_Intelligence = {
            'Político': "<b>1. Proclamación Califal:</b> Abd al-Raḥmān III establece el Califato en 929.<br><br><b>2. Dictadura de Almanzor:</b> Militarismo expansionista.",
            'Social': "<b>1. Arrabales:</b> Urbanismo democrático andalusí.<br><br><b>2. Saqaliba:</b> Influencia de los esclavos europeos.",
            'Económico': "<b>1. Dinero de Oro:</b> El dinar cordobés domina el Mediterráneo.<br><br><b>2. Seda:</b> Exportación a Bagdad.",
            'Cultural': "<b>1. Biblioteca de Al-Hakam II:</b> 400.000 volúmenes.<br><br><b>2. Madīnat al-Zahrāʾ:</b> La ciudad palatina de luz."
        };

        const cursor = document.getElementById('nil-cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });

        function build() {
            const path = document.getElementById('nile-path');
            const nodes = document.getElementById('nodes');
            const len = path.getTotalLength();
            timeline.forEach((era, i) => {
                const frac = (i + 0.2) / timeline.length;
                const p = path.getPointAtLength(frac * len);
                const div = document.createElement('div');
                div.className = 'era-node';
                div.style.left = p.x + 'px'; div.style.top = p.y + 'px';
                div.innerHTML = `<div class="era-dot"></div><div class="era-label"><p class="era-name">Siglo ${era.s}</p></div>`;
                div.onclick = () => { document.getElementById('p-title').innerText = `Siglo ${era.s}`; toggle(true); };
                nodes.appendChild(div);
            });
        }

        function toggle(s) { document.getElementById('info-panel').classList.toggle('active', s); }

        function query(ambito) {
            const b = document.getElementById('p-body');
            b.innerHTML = "...Sincronizando con Nil...";
            setTimeout(() => {
                if(document.getElementById('p-title').innerText.includes('Siglo X')) b.innerHTML = sX_Intelligence[ambito];
                else b.innerHTML = "Consultando con los astrolabios... El saber de este siglo aún está siendo decodificado.";
            }, 1000);
        }

        let keyStr = "";
        document.addEventListener('keydown', e => {
            keyStr += e.key.toUpperCase();
            if(keyStr.includes("LOG")) document.getElementById('dev-console').classList.toggle('active');
            if(keyStr.length > 5) keyStr = "";
        });

        window.onload = build;
    </script>
</body>
</html>
