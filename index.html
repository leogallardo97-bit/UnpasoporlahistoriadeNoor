<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Archive Nil | Al-Andalus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&family=Cormorant+Garamond:ital,wght@1,500;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --nil-cyan: #00f2ff;
            --califal-gold: #d4af37;
            --text-silver: #d1d1d1;
            --glass: rgba(255, 255, 255, 0.02);
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-silver);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Nil Entity --- */
        #nil-avatar {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            z-index: 1000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nil-drop {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, var(--nil-cyan), transparent);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            animation: float 4s ease-in-out infinite, ripple 3s linear infinite;
            position: relative;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes ripple {
            0% { border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
            50% { border-radius: 45% 55% 45% 55% / 55% 45% 55% 45%; }
            100% { border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
        }

        .nil-bubble {
            position: absolute;
            bottom: 80px;
            right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            width: 300px;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
            pointer-events: none;
            color: var(--nil-cyan);
            font-weight: 300;
            font-size: 0.95rem;
            text-align: right;
        }

        #nil-avatar:hover .nil-bubble {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Layout --- */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 5;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5rem;
            letter-spacing: 4px;
            color: var(--califal-gold);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        header p {
            font-size: 1.3rem;
            max-width: 800px;
            line-height: 1.8;
            letter-spacing: 2px;
            font-weight: 200;
            opacity: 0.8;
        }

        /* --- Fluvial Path --- */
        .river-container {
            position: relative;
            width: 100%;
            height: 4000px; /* Longitud del viaje */
            margin-top: -10vh;
        }

        .river-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .river-path {
            fill: none;
            stroke: var(--nil-cyan);
            stroke-width: 2;
            stroke-dasharray: 10, 20;
            opacity: 0.15;
        }

        .nil-flow-line {
            fill: none;
            stroke: var(--nil-cyan);
            stroke-width: 1;
            opacity: 0.4;
            filter: blur(1px);
        }

        /* --- Century Nodes --- */
        .node {
            position: absolute;
            z-index: 10;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: var(--transition);
        }

        .node-circle {
            width: 24px;
            height: 24px;
            background: var(--bg);
            border: 2px solid var(--califal-gold);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .node:hover .node-circle {
            background: var(--califal-gold);
            transform: scale(1.5);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.8);
        }

        .node-label {
            position: absolute;
            left: 40px;
            white-space: nowrap;
            color: var(--califal-gold);
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 200;
            text-transform: uppercase;
        }

        .node-desc {
            position: absolute;
            left: 40px;
            top: 30px;
            white-space: nowrap;
            color: var(--text-silver);
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        /* --- Info Card --- */
        .info-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 800px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            padding: 4rem;
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: var(--transition);
            box-shadow: 0 100px 200px rgba(0,0,0,1);
        }

        .info-card.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .card-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--califal-gold);
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--califal-gold);
            margin-bottom: 2rem;
        }

        .card-body {
            font-size: 1.2rem;
            line-height: 1.9;
            font-weight: 200;
            color: #fff;
            margin-bottom: 3rem;
        }

        .category-links {
            display: flex;
            gap: 1.5rem;
        }

        .cat-btn {
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--nil-cyan);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cat-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--nil-cyan);
        }

        /* --- Loading Overlay --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #loader p {
            color: var(--nil-cyan);
            letter-spacing: 4px;
            font-weight: 200;
            margin-top: 2rem;
        }

        .loading-wave {
            width: 100px;
            height: 2px;
            background: var(--nil-cyan);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px var(--nil-cyan);
        }

        .loading-wave::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: wave-run 1.5s infinite;
        }

        @keyframes wave-run {
            100% { left: 100%; }
        }

    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-wave"></div>
        <p id="loader-msg">Nil está buceando en los archivos de Córdoba...</p>
    </div>

    <div id="nil-avatar">
        <div class="nil-bubble">Hola, soy Nil y te acompañaré en este viaje.</div>
        <div class="nil-drop"></div>
    </div>

    <header>
        <h1>Noor Archive Nil</h1>
        <p>"Un paso por la historia que se convirtió en la madre de culturas de Occidente: Al-Andalus"</p>
        <div style="margin-top: 5rem; opacity: 0.3; letter-spacing: 5px;">DESLIZA PARA NAVEGAR EL RÍO DEL TIEMPO ↓</div>
    </header>

    <div class="river-container">
        <svg class="river-svg" viewBox="0 0 1000 4000">
            <path id="main-river" class="river-path" d="M 500 0 Q 700 300 500 600 T 500 1200 T 500 1800 T 500 2400 T 500 3000 T 500 3600 T 500 4000" />
            <path id="flow-line" class="nil-flow-line" d="" />
        </svg>

        <!-- Nodes will be injected here via JS -->
    </div>

    <div id="info-modal" class="info-card">
        <div class="card-close" onclick="closeModal()">&times;</div>
        <h2 class="card-title" id="m-title">Siglo X</h2>
        <div class="card-body" id="m-body">
            ...
        </div>
        <div class="category-links">
            <button class="cat-btn" onclick="deepQuery('Político')">Político</button>
            <button class="cat-btn" onclick="deepQuery('Social')">Social</button>
            <button class="cat-btn" onclick="deepQuery('Económico')">Económico</button>
            <button class="cat-btn" onclick="deepQuery('Cultural')">Cultural</button>
        </div>
    </div>

    <script>
        const riverPath = document.getElementById('main-river');
        const centuries = [
            { num: 'X', label: 'El Califato', desc: 'Córdoba como centro del mundo' },
            { num: 'XI', label: 'Las Taifas', desc: 'Fragmentación y florecimiento' },
            { num: 'XII', label: 'Imperios Africanos', desc: 'Almorávides y Almohades' },
            { num: 'XIII', label: 'Guerra y Reconquista', desc: 'El avance cristiano' },
            { num: 'XIV', label: 'Reino de Granada', desc: 'El esplendor de la Alhambra' },
            { num: 'XV', label: 'El Final de una Era', desc: '1492 y la rendición' },
            { num: 'XVI', label: 'Memoria Morisca', desc: 'El legado persistente' },
            { num: 'XVII', label: 'Diáspora', desc: 'La expulsión definitiva' },
            { num: 'XVIII', label: 'Arqueología del Saber', desc: 'La Ilustración redescubierta' },
            { num: 'XIX', label: 'El Mito Romántico', desc: 'Washington Irving y los viajeros' }
        ];

        let currentS = '';

        function setupNodes() {
            const container = document.querySelector('.river-container');
            const pathLength = riverPath.getTotalLength();
            
            centuries.forEach((c, index) => {
                const fraction = (index + 0.5) / centuries.length;
                const point = riverPath.getPointAtLength(fraction * pathLength);
                
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = point.x + 'px';
                node.style.top = point.y + 'px';
                node.onclick = () => openModal(c.num, c.label);
                
                node.innerHTML = `
                    <div class="node-circle"></div>
                    <div class="node-label">Siglo ${c.num}</div>
                    <div class="node-desc">${c.label}</div>
                `;
                
                container.appendChild(node);
            });
        }

        function openModal(siglo, label) {
            currentS = siglo;
            document.getElementById('m-title').innerText = `Siglo ${siglo} - ${label}`;
            document.getElementById('m-body').innerText = `Has llegado a una sección clave del Nilo. Selecciona una dimensión para que Nil bucee en los archivos específicos del Siglo ${siglo}.`;
            document.getElementById('info-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('info-modal').classList.remove('active');
        }

        function deepQuery(ambito) {
            const loader = document.getElementById('loader');
            const msg = document.getElementById('loader-msg');
            const locations = ['Córdoba', 'Sevilla', 'Granada', 'Toledo', 'Almería'];
            const randomLoc = locations[Math.floor(Math.random()*locations.length)];
            
            msg.innerText = `Nil está buceando en los archivos de ${randomLoc}...`;
            loader.style.display = 'flex';
            
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('m-body').innerHTML = `<span style="color: var(--nil-cyan)">NIL REPORT (S.${currentS} / ${ambito}):</span><br><br>La corriente nos muestra que en el siglo ${currentS}, el ámbito ${ambito} fue determinante para la evolución de la madre de las culturas. Los registros recuperados de NotebookLM confirman una infraestructura de conocimiento sin precedentes.`;
            }, 1800);
        }

        window.onload = setupNodes;

        // Custom Flow Scroll Effect
        window.addEventListener('scroll', () => {
            const flow = document.getElementById('flow-line');
            const dash = 2000;
            // logic to animate line could go here
        });

    </script>
</body>
</html>
