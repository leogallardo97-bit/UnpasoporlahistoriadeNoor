<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Archive Nil | El Paseo de Noor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=JetBrains+Mono:wght@300;500&family=Outfit:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --nil-cyan: #00f2ff;
            --noor-gold: #d4af37;
            --text-off: #a0a0a0;
            --transition-fluid: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); /* Efecto grano sutil */
        }

        /* --- Custom Cursor --- */
        #nil-cursor {
            width: 12px;
            height: 12px;
            background: var(--nil-cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--nil-cyan);
            transition: transform 0.1s ease;
        }

        /* --- Nil Guiding Entity --- */
        #nil-guide {
            position: fixed;
            bottom: 50px;
            right: 50px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .nil-avatar {
            width: 50px;
            height: 70px;
            background: linear-gradient(var(--nil-cyan), transparent);
            border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
            animation: drift 5s ease-in-out infinite;
            filter: blur(2px);
            opacity: 0.8;
        }

        @keyframes drift {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-10px); }
        }

        .nil-speech {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 1.2rem;
            border-radius: 15px;
            color: var(--nil-cyan);
            font-size: 0.9rem;
            max-width: 250px;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.9);
            transition: var(--transition-fluid);
        }

        #nil-guide:hover .nil-speech {
            opacity: 1;
            transform: scale(1);
        }

        /* --- Header / Hero --- */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 10%;
        }

        .title-pre {
            color: var(--noor-gold);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 2rem;
            font-size: 0.8rem;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            color: #fff;
            margin-bottom: 3rem;
            font-style: italic;
        }

        header .slogan {
            font-size: 1.4rem;
            color: var(--text-off);
            max-width: 800px;
            line-height: 1.8;
            font-weight: 100;
            letter-spacing: 4px;
        }

        /* --- The Nile Path (Fluvial Navigation) --- */
        .nile-container {
            position: relative;
            width: 100%;
            height: 6000px;
        }

        .nile-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .nile-path-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.03);
            stroke-width: 4;
        }

        .nile-path-active {
            fill: none;
            stroke: var(--nil-cyan);
            stroke-width: 2;
            filter: blur(1px);
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* --- Decade Nodes --- */
        .era-node {
            position: absolute;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
        }

        .era-dot {
            width: 20px;
            height: 20px;
            border: 1px solid var(--noor-gold);
            border-radius: 50%;
            background: var(--bg);
            transition: var(--transition-fluid);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .era-node:hover .era-dot {
            background: var(--noor-gold);
            transform: scale(2);
            box-shadow: 0 0 30px var(--noor-gold);
        }

        .era-content {
            position: absolute;
            left: 50px;
            min-width: 400px;
            opacity: 0.6;
            transition: var(--transition-fluid);
        }

        .era-node:hover .era-content {
            opacity: 1;
            transform: translateX(20px);
        }

        .era-year {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--noor-gold);
            margin-bottom: 0.5rem;
        }

        .era-cta {
            font-family: 'Outfit', sans-serif;
            font-weight: 100;
            letter-spacing: 3px;
            color: var(--text-off);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* --- Modals --- */
        #data-modal {
            position: fixed;
            top: 0;
            right: -100%;
            width: 45%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(50px);
            z-index: 2000;
            border-left: 1px solid rgba(212, 175, 55, 0.1);
            padding: 8rem 5rem;
            transition: var(--transition-fluid);
        }

        #data-modal.active { right: 0; }

        /* --- Dev Mode Easter Egg --- */
        #dev-panel {
            position: fixed;
            left: -100%;
            top: 0;
            width: 30%;
            height: 100%;
            background: rgba(0, 20, 30, 0.95);
            z-index: 3000;
            font-family: 'JetBrains Mono', monospace;
            padding: 2rem;
            border-right: 2px solid var(--nil-cyan);
            color: var(--nil-cyan);
            transition: var(--transition-fluid);
        }

        #dev-panel.active { left: 0; }

        .log-entry { font-size: 0.7rem; margin-bottom: 5px; opacity: 0.7; }
        .log-cyan { color: #0f0; }

        /* --- Loading Overlay --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s;
        }

    </style>
</head>
<body>

    <div id="nil-cursor"></div>

    <div id="loader">
        <div style="width: 200px; height: 1px; background: rgba(0,242,255,0.2); position: relative;">
            <div id="loader-progress" style="width: 0%; height: 100%; background: var(--nil-cyan); box-shadow: 0 0 10px var(--nil-cyan);"></div>
        </div>
        <p id="loader-msg" style="margin-top: 2rem; font-family: 'JetBrains Mono'; font-size: 0.7rem; letter-spacing: 5px; color: var(--nil-cyan);">INICIANDO PROTOCOLO NOOR...</p>
    </div>

    <div id="dev-panel">
        <h3 style="margin-bottom: 2rem;">[MCP_SYSTEM_BRIDGE_V.4]</h3>
        <div id="log-stream"></div>
    </div>

    <div id="nil-guide">
        <div class="nil-speech">Hola, soy Nil y te acompañaré en este viaje.</div>
        <div class="nil-avatar"></div>
    </div>

    <header>
        <div class="title-pre">Noor Archive Nil</div>
        <h1>"Un paso por la historia que se convirtió en la madre de culturas de Occidente: Al-Andalus"</h1>
        <p class="slogan">Explora el flujo del conocimiento a través del Nilo de la memoria.</p>
    </header>

    <div class="nile-container">
        <svg class="nile-svg" viewBox="0 0 1000 6000" preserveAspectRatio="none">
            <path id="nile-path-main" class="nile-path-bg" d="M 500 0 C 800 500 200 1000 500 1500 S 800 2500 500 3000 S 200 4000 500 4500 S 800 5500 500 6000" />
            <path id="nile-path-flow" class="nile-path-active" d="M 500 0 C 800 500 200 1000 500 1500 S 800 2500 500 3000 S 200 4000 500 4500 S 800 5500 500 6000" />
        </svg>

        <div id="nodes-layer"></div>
    </div>

    <div id="data-modal">
        <div id="modal-content"></div>
    </div>

    <script>
        const eras = [
            { s: 'X', label: 'Califato de Córdoba', cta: 'Descifra los pergaminos de la biblioteca de Al-Hakam II...' },
            { s: 'XI', label: 'Cortes de Taifas', cta: 'Explora la fragmentación del poder en las cortes de taifas...' },
            { s: 'XII', label: 'Era Almorávide/Almohade', cta: 'Cruza el desierto con los ejércitos almorávides y almohades...' },
            { s: 'XIII', label: 'Foundations of Granada', cta: 'Sigue el rastro de la seda hacia los cimientos de la Alhambra...' },
            { s: 'XIV', label: 'Esplendor Nazarí', cta: 'Escucha el murmullo de las aguas en el Generalife...' },
            { s: 'XV', label: 'Las Capitulaciones', cta: 'Escucha los ecos finales de las Capitulaciones de Granada...' },
            { s: 'XVI', label: 'Resistencia Morisca', cta: 'Observa la resistencia de la lengua ante el olvido morisco...' },
            { s: 'XVII', label: 'Diáspora y Exilio', cta: 'Rastrea la huella andalusí en los exilios del Magreb...' },
            { s: 'XVIII', label: 'Mirada Ilustrada', cta: 'Ilumina las ruinas romanas bajo la mirada ilustrada...' },
            { s: 'XIX', label: 'Mito Romántico', cta: 'Redescubre el romanticismo en los cuentos de la Alhambra...' }
        ];

        // Custom Cursor
        const cursor = document.getElementById('nil-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Initialize Nile
        const path = document.getElementById('nile-path-main');
        const nodesLayer = document.getElementById('nodes-layer');
        const totalLength = path.getTotalLength();

        function createNodes() {
            eras.forEach((era, i) => {
                const fraction = (i + 0.5) / eras.length;
                const point = path.getPointAtLength(fraction * totalLength);
                
                const node = document.createElement('div');
                node.className = 'era-node';
                node.style.left = point.x + 'px';
                node.style.top = point.y + 'px';
                
                node.innerHTML = `
                    <div class="era-dot"></div>
                    <div class="era-content">
                        <div class="era-year">S.${era.s}</div>
                        <div class="era-cta">${era.cta}</div>
                    </div>
                `;
                
                node.onclick = () => openEra(era);
                nodesLayer.appendChild(node);
            });
        }

        function openEra(era) {
            const modal = document.getElementById('data-modal');
            const content = document.getElementById('modal-content');
            
            const loadings = [
                `Nil está buceando en los archivos de ${era.label}...`,
                "Sincronizando los astrolabios del conocimiento...",
                "Extrayendo sabiduría de los manuscritos perdidos...",
                "Nil fluye a través de los meandros del tiempo..."
            ];
            
            log(`CALL: MCP_BRIDGE -> SIGLO_${era.s}`);
            log(`STATUS: ${loadings[Math.floor(Math.random()*loadings.length)]}`);
            
            modal.classList.add('active');
            content.innerHTML = `<h2 style="font-family: Cormorant Garamond; font-size: 3rem; color: var(--noor-gold); margin-bottom: 2rem;">Siglo ${era.s} / ${era.label}</h2><p style="font-weight: 200; line-height: 2; font-size: 1.1rem; color: var(--text-off);">${era.cta}<br><br>Conectando con la base de datos Wos 2026...</p>`;
        }

        // Dev Mode Easter Egg
        let typed = "";
        document.addEventListener('keydown', (e) => {
            typed += e.key.toUpperCase();
            if(typed.includes("LOG")) {
                document.getElementById('dev-panel').classList.toggle('active');
                typed = "";
                log("DEV_MODE: System Access Granted.");
            }
            if(typed.length > 10) typed = "";
        });

        function log(msg) {
            const stream = document.getElementById('log-stream');
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `[${new Date().toLocaleTimeString()}] <span class="log-cyan">${msg}</span>`;
            stream.prepend(div);
        }

        // Loader Sequence
        window.addEventListener('load', () => {
            const l = document.getElementById('loader');
            const prog = document.getElementById('loader-progress');
            let p = 0;
            const int = setInterval(() => {
                p += Math.random() * 10;
                prog.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(int);
                    l.style.opacity = '0';
                    setTimeout(() => l.style.display = 'none', 1000);
                }
            }, 100);
        });

        createNodes();
    </script>
</body>
</html>
